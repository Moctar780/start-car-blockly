name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install NDK
        run: |
          yes | sdkmanager --install 'build-tools;34.0.0' 'platforms;android-34' 'ndk;23.2.8568313' --sdk_root=$ANDROID_HOME 2>&1 || true
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME 2>&1 || true

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/$GODOT_VERSION-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          echo "GODOT_BIN=$(pwd)/Godot_v${GODOT_VERSION}-stable_linux.x86_64" >> $GITHUB_ENV

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/$GODOT_VERSION-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}-stable
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/${GODOT_VERSION}-stable/
          if [ -d ~/.local/share/godot/export_templates/${GODOT_VERSION}-stable/templates ]; then
            mv ~/.local/share/godot/export_templates/${GODOT_VERSION}-stable/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}-stable/
            rm -rf ~/.local/share/godot/export_templates/${GODOT_VERSION}-stable/templates/
          fi

      - name: Build APK
        run: |
          mkdir -p build
          $GODOT_BIN --headless --export-debug "Android" build/racing-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: racing-android-apk
          path: build/racing-debug.apk
          if-no-files-found: error
