name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Android Export

    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot 4.6
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6
          export-templates: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install NDK
        run: |
          yes | sdkmanager --install 'build-tools;34.0.0' 'platforms;android-34' 'ndk;23.2.8568313' --sdk_root=$ANDROID_HOME 2>&1 || true
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME 2>&1 || true

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --export-debug "Android" build/racing-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: racing-android-apk
          path: build/racing-debug.apk
          if-no-files-found: error
