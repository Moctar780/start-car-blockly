name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Android Export

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --install 'build-tools;34.0.0' 'platforms;android-34' 'ndk;23.2.8568313' --sdk_root=$ANDROID_HOME 2>&1 || true
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME 2>&1 || true

      - name: Download Godot
        run: |
          wget -qO godot.zip https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -qo godot.zip
          echo "./Godot_v4.6-stable_linux.x86_64" >> $GITHUB_PATH

      - name: Install Export Templates
        run: |
          wget -qO templates.tpz https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6-stable
          unzip -qo templates.tpz -d ~/.local/share/godot/export_templates/4.6-stable/
          rsync -a ~/.local/share/godot/export_templates/4.6-stable/templates/ ~/.local/share/godot/export_templates/4.6-stable/
          rm -rf ~/.local/share/godot/export_templates/4.6-stable/templates/
          ls ~/.local/share/godot/export_templates/4.6-stable/

      - name: Build APK
        run: |
          mkdir -p build
          Godot_v4.6-stable_linux.x86_64 --headless --export-debug "Android" build/racing-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: racing-android-apk
          path: build/racing-debug.apk
          if-no-files-found: error
